services:
  app:
    container_name: foloup-app
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - SUPABASE_PROJECT_ID=${SUPABASE_PROJECT_ID}
        - SUPABASE_ACCESS_TOKEN=${SUPABASE_ACCESS_TOKEN}
        - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}
        - CACHEBUST=${CACHEBUST:-1}
    expose:
      - "80"
    environment:
      - NODE_ENV=production
      - VIRTUAL_HOST=dreamit.agenticdream.com
      - LETSENCRYPT_HOST=dreamit.agenticdream.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.foloup.rule=Host(`foloup.agenticdream.com`)"
      - "traefik.http.routers.foloup.entrypoints=web,websecure"
      - "traefik.http.routers.foloup.tls=true"
      - "traefik.http.routers.foloup.tls.certresolver=letsencrypt"
      - "traefik.http.services.foloup.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
