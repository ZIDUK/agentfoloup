services:
  foloup:
    container_name: foloup-app
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL}
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL}
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL}
        - NEXT_PUBLIC_LIVE_URL=${NEXT_PUBLIC_LIVE_URL}
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_SKIP_AUTH=${NEXT_PUBLIC_SKIP_AUTH}
        - NEXT_PUBLIC_DEEPGRAM_API_KEY=${NEXT_PUBLIC_DEEPGRAM_API_KEY}
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - GOOGLE_CLIENT_SECRET_KEY=${GOOGLE_CLIENT_SECRET_KEY}
        - SUPABASE_PROJECT_ID=${SUPABASE_PROJECT_ID}
        - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
        - SUPABASE_ACCESS_TOKEN=${SUPABASE_ACCESS_TOKEN}
        - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
        - DEEPGRAM_PROJECT_ID=${DEEPGRAM_PROJECT_ID}
        - MISTRAL_API_KEY=${MISTRAL_API_KEY}
        - MISTRAL_MODEL=${MISTRAL_MODEL}
        - SKIP_AUTH=${SKIP_AUTH}
        - DREAMIT_URL=${DREAMIT_URL}
        - DREAMIT_FOLOUP_SECRET=${DREAMIT_FOLOUP_SECRET}
        - DREAMIT_SUPABASE_SERVICE_ROLE_KEY=${DREAMIT_SUPABASE_SERVICE_ROLE_KEY}
        - CACHEBUST=${CACHEBUST:-1}
    expose:
      - "80"
    environment:
      - NODE_ENV=production
      - VIRTUAL_HOST=dreamit.agenticdream.com
      - LETSENCRYPT_HOST=dreamit.agenticdream.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.foloup.rule=Host(`foloup.agenticdream.com`)"
      - "traefik.http.routers.foloup.entrypoints=web,websecure"
      - "traefik.http.routers.foloup.tls=true"
      - "traefik.http.routers.foloup.tls.certresolver=letsencrypt"
      - "traefik.http.services.foloup.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
